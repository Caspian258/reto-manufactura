<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Operaciones Industrial</title>
    <!-- Librerías de React y Transpiler -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuración de tu imagen
        const firebaseConfig = {
            apiKey: "AIzaSyD-TtzoEhd9ZE5cqLmPwk2bjd3EhVFEfTo",
            authDomain: "reto-manufactura.firebaseapp.com",
            projectId: "reto-manufactura",
            storageBucket: "reto-manufactura.firebasestorage.app",
            messagingSenderId: "499020157446",
            appId: "1:499020157446:web:87c6a3c4516a73ef9ee987",
            measurementId: "G-C26RT2K5K6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Exponer a window para que React los use
        window.db = db;
        window.auth = auth;
        window.fs = { collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch };
        window.at = { signInAnonymously, onAuthStateChanged };
    </script>

    <!-- Aplicación React -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch } = window.fs;
        const { signInAnonymously, onAuthStateChanged } = window.at;

        const INITIAL_PLAN = [
            { category: 'Planta 1', main: 'Instrumentación CIMA', desc: 'Digitalización con ESP32-S3 y sensores.', members: 'Por asignar', deadline: '2025-03-01', status: 'In Progress', priority: 'High', subtasks: [] },
            { category: 'Planta 2', main: 'Celda 1: PLC Siemens', desc: 'Lógica en S7-1200.', members: 'Sebas, Amir, Nico', deadline: '2025-02-07', status: 'In Progress', priority: 'Critical', subtasks: [] },
            { category: 'Planta 2', main: 'Celda 2: Acabado', desc: 'Control de procesos avanzado.', members: 'Dani, Mariano', deadline: '2025-02-07', status: 'In Progress', priority: 'Critical', subtasks: [] }
        ];

        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isAdding, setIsAdding] = useState(false);
            const [form, setForm] = useState({ category: 'Planta_1', main: '', desc: '', members: '', deadline: '', status: 'TODO', priority: 'Medium' });

            useEffect(() => {
                const setup = async () => {
                    await signInAnonymously(window.auth);
                    onAuthStateChanged(window.auth, (user) => {
                        if (user) {
                            const colRef = collection(window.db, 'tasks');
                            onSnapshot(colRef, (snapshot) => {
                                if (snapshot.empty && loading) {
                                    seedData();
                                } else {
                                    setTasks(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                                    setLoading(false);
                                }
                            });
                        }
                    });
                };
                setup();
            }, []);

            const seedData = async () => {
                const batch = writeBatch(window.db);
                INITIAL_PLAN.forEach(item => {
                    const ref = doc(collection(window.db, 'tasks'));
                    batch.set(ref, { ...item, createdAt: new Date().toISOString() });
                });
                await batch.commit();
            };

            const handleSave = async () => {
                await addDoc(collection(window.db, 'tasks'), { ...form, createdAt: new Date().toISOString() });
                setIsAdding(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400 animate-pulse">SINCRONIZANDO SISTEMA...</div>;

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12">
                    <header className="flex justify-between items-end mb-12 border-b-2 border-slate-100 pb-8">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                                <span className="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Cloud Database Active</span>
                            </div>
                            <h1 className="text-4xl font-black text-slate-900 tracking-tighter italic uppercase">Gestión de Operaciones</h1>
                        </div>
                        <button onClick={() => setIsAdding(true)} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-xl shadow-indigo-100">+ Nueva Actividad</button>
                    </header>

                    <div className="space-y-4">
                        {tasks.map(task => (
                            <div key={task.id} className="bg-white border rounded-[2rem] p-8 flex items-center shadow-sm">
                                <div className="flex-1">
                                    <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">{task.category}</span>
                                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">{task.main}</h2>
                                    <p className="text-sm text-slate-400 font-medium italic">"{task.desc}"</p>
                                </div>
                                <div className="flex gap-12 text-right items-center">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-300 uppercase">Equipo</p>
                                        <p className="text-sm font-black text-slate-600">{task.members}</p>
                                    </div>
                                    <div className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase border text-center min-w-[110px]
                                        ${task.status === 'Completed' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-indigo-50 text-indigo-700 border-indigo-100'}`}>
                                        {task.status}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 max-w-xl w-full">
                                <h2 className="text-2xl font-black text-slate-900 uppercase italic mb-6">Nueva Tarea</h2>
                                <input className="w-full p-4 bg-slate-50 border rounded-2xl mb-4 font-bold outline-none" placeholder="Nombre" onChange={e => setForm({...form, main: e.target.value})} />
                                <textarea className="w-full p-4 bg-slate-50 border rounded-2xl mb-4 font-medium outline-none h-24" placeholder="Descripción" onChange={e => setForm({...form, desc: e.target.value})} />
                                <div className="flex gap-4">
                                    <button onClick={() => setIsAdding(false)} className="flex-1 font-bold text-slate-400">Cerrar</button>
                                    <button onClick={handleSave} className="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase">Sincronizar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
