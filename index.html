<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Manufactura</title>
    <!-- Librerías base para que el navegador entienda React y Tailwind sin compilador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Módulo de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuración exacta de tu imagen
        const firebaseConfig = {
            apiKey: "AIzaSyD-TtzoEhd9ZE5cqLmPwK2bjD3eHVfEfTo",
            authDomain: "reto-manufactura.firebaseapp.com",
            projectId: "reto-manufactura",
            storageBucket: "reto-manufactura.firebasestorage.app",
            messagingSenderId: "499020157446",
            appId: "1:499020157446:web:87c6a3c4516a73ef9ee987",
            measurementId: "G-C26RT2K5K6"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            
            // Exponemos las funciones al objeto window para que React pueda usarlas
            window.db = db;
            window.auth = auth;
            window.appId = "reto-manufactura";
            window.fs = { collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch };
            window.at = { signInAnonymously, onAuthStateChanged };
            
            // Notificamos que Firebase está listo
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Error inicializando Firebase:", error);
            window.firebaseInitError = error.message;
        }
    </script>

    <!-- Aplicación React compilada en tiempo real por Babel -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_PLAN = [
            { category: 'Planta 1', main: 'Instrumentación CIMA', desc: 'Digitalización con ESP32-S3 y sensores.', members: 'Por asignar', deadline: '2025-03-01', status: 'In Progress', priority: 'High', subtasks: [] },
            { category: 'Planta 2', main: 'Celda 1: PLC Siemens', desc: 'Lógica secuencial en S7-1200.', members: 'Sebas, Amir, Nico', deadline: '2025-02-07', status: 'In Progress', priority: 'Critical', subtasks: [] },
            { category: 'Planta 2', main: 'Celda 2: Acabado', desc: 'Control de procesos avanzado.', members: 'Dani, Mariano', deadline: '2025-02-07', status: 'In Progress', priority: 'Critical', subtasks: [] }
        ];

        const App = () => {
            const [activities, setActivities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            const [filter, setFilter] = useState('All');
            const [isAdding, setIsAdding] = useState(false);
            const [expandedId, setExpandedId] = useState(null);
            const [form, setForm] = useState({ category: 'Planta 1', main: '', desc: '', members: '', deadline: '', status: 'Todo', priority: 'Medium' });

            useEffect(() => {
                const initApp = () => {
                    if (window.firebaseInitError) {
                        setErrorMsg("Error de configuración: " + window.firebaseInitError);
                        setLoading(false);
                        return;
                    }
                    setupFirebase();
                };

                // Si Firebase ya cargó antes que el componente
                if (window.db) {
                    initApp();
                } else {
                    // Esperamos el evento de carga
                    window.addEventListener('firebase-ready', initApp);
                }
                
                return () => window.removeEventListener('firebase-ready', initApp);
            }, []);

            const setupFirebase = async () => {
                const { signInAnonymously, onAuthStateChanged } = window.at;
                const { collection, onSnapshot } = window.fs;

                try {
                    // Intentamos loguearnos
                    const userCredential = await signInAnonymously(window.auth);
                    
                    onAuthStateChanged(window.auth, (user) => {
                        if (user) {
                            // Conectamos a la colección
                            const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activities');
                            
                            const unsubscribe = onSnapshot(colRef, (snapshot) => {
                                if (snapshot.empty) {
                                    seedInitialData();
                                } else {
                                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                                    setActivities(docs);
                                    setLoading(false);
                                }
                            }, (err) => {
                                console.error("Error de Firestore:", err);
                                setErrorMsg("Error de base de datos: Verifica que las REGLAS de Firestore estén públicas (allow read, write: if true).");
                                setLoading(false);
                            });

                            return () => unsubscribe();
                        }
                    });
                } catch (err) {
                    console.error("Error de Auth:", err);
                    setErrorMsg("Error de Autenticación: Asegúrate de activar 'Anonymous Login' en la consola de Firebase (Authentication > Sign-in Method).");
                    setLoading(false);
                }
            };

            const seedInitialData = async () => {
                const { collection, doc, writeBatch } = window.fs;
                const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activities');
                const batch = writeBatch(window.db);
                
                INITIAL_PLAN.forEach(item => {
                    const newDoc = doc(colRef);
                    batch.set(newDoc, { ...item, createdAt: new Date().toISOString() });
                });
                
                try {
                    await batch.commit();
                } catch (e) {
                    console.error("Error sembrando datos:", e);
                }
            };

            const handleSave = async () => {
                const { collection, addDoc } = window.fs;
                const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activities');
                try {
                    await addDoc(colRef, { ...form, subtasks: [], createdAt: new Date().toISOString() });
                    setIsAdding(false);
                    setForm({ category: 'Planta 1', main: '', desc: '', members: '', deadline: '', status: 'Todo', priority: 'Medium' });
                } catch (e) {
                    alert("Error al guardar: " + e.message);
                }
            };

            const toggleSubtask = async (task, subIndex) => {
                const { doc, updateDoc } = window.fs;
                const taskRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', task.id);
                const newSubtasks = [...(task.subtasks || [])];
                newSubtasks[subIndex].completed = !newSubtasks[subIndex].completed;
                await updateDoc(taskRef, { subtasks: newSubtasks });
            };

            const removeTask = async (id) => {
                const { doc, deleteDoc } = window.fs;
                const taskRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', id);
                if(confirm('¿Eliminar esta actividad?')) {
                    await deleteDoc(taskRef);
                }
            };

            if (errorMsg) return (
                <div className="h-screen flex items-center justify-center bg-red-50 p-6">
                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-red-200 max-w-lg text-center">
                        <div className="text-red-500 text-5xl mb-4">⚠️</div>
                        <h2 className="text-2xl font-black text-slate-800 uppercase mb-4 tracking-tighter">Problema de Conexión</h2>
                        <p className="text-slate-600 font-medium mb-6 leading-relaxed">{errorMsg}</p>
                        <button onClick={() => window.location.reload()} className="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-black transition-all">Reintentar Conexión</button>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="w-16 h-16 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-6"></div>
                    <div className="font-black text-slate-400 tracking-[0.4em] uppercase text-xs animate-pulse text-center px-8">
                        Estableciendo Enlace con la Nube...
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-6 md:p-12 animate-in fade-in duration-700">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
                        <div>
                            <p className="text-[10px] font-black text-emerald-600 uppercase tracking-[0.3em] mb-1 italic">● Sistema Sincronizado</p>
                            <h1 className="text-5xl font-black text-slate-900 tracking-tighter italic uppercase leading-none">Gestión de Operaciones</h1>
                        </div>
                        <div className="flex gap-4">
                            <select className="bg-white border-2 border-slate-200 p-3 rounded-2xl text-[10px] font-black uppercase outline-none shadow-sm cursor-pointer" onChange={e => setFilter(e.target.value)}>
                                <option value="All">Todas las Áreas</option>
                                <option value="Planta 1">Planta 1</option>
                                <option value="Planta 2">Planta 2</option>
                            </select>
                            <button onClick={() => setIsAdding(true)} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">+ Nueva Actividad</button>
                        </div>
                    </header>

                    <div className="space-y-4">
                        {activities.filter(a => filter === 'All' || a.category === filter).map(task => (
                            <div key={task.id} className="bg-white border border-slate-200 rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-md transition-all group">
                                <div className="p-6 md:p-8 flex flex-col md:flex-row items-center">
                                    <div className="flex-1 w-full cursor-pointer" onClick={() => setExpandedId(expandedId === task.id ? null : task.id)}>
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">{task.category}</span>
                                            {task.priority === 'Critical' && <span className="text-[10px] font-black text-red-500 uppercase animate-pulse tracking-widest">● Prioridad Crítica</span>}
                                        </div>
                                        <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">{task.main}</h3>
                                        <p className="text-sm text-slate-400 font-medium italic mt-1 line-clamp-1">"{task.desc}"</p>
                                    </div>

                                    <div className="flex flex-col md:flex-row items-center gap-8 md:gap-16 mt-6 md:mt-0 w-full md:w-auto border-t md:border-t-0 md:border-l border-slate-100 pt-6 md:pt-0 md:pl-12">
                                        <div className="text-center md:text-right w-full md:w-32">
                                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-tighter mb-1 font-bold">Responsables</p>
                                            <p className="text-sm font-black text-slate-600 truncate">{task.members}</p>
                                        </div>
                                        <div className="text-center md:text-right w-full md:w-28">
                                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-tighter mb-1 font-bold">Entrega</p>
                                            <p className="text-sm font-black text-slate-600 italic">{task.deadline}</p>
                                        </div>
                                        <div className="w-full md:w-32 flex justify-center md:justify-end">
                                            <span className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border text-center block w-full shadow-sm
                                                ${task.status === 'Completed' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 
                                                  task.status === 'In Progress' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                                {task.status}
                                            </span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => removeTask(task.id)} className="p-2 text-slate-300 hover:text-red-500 transition-colors">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {expandedId === task.id && (
                                    <div className="bg-slate-50 border-t border-slate-100 p-8 animate-in slide-in-from-top-4 duration-300">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4 italic font-bold">Checklist de Sub-actividades</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {(task.subtasks || []).map((sub, i) => (
                                                <div key={i} onClick={() => toggleSubtask(task, i)} className="flex items-center gap-4 p-4 bg-white rounded-2xl border border-slate-200 cursor-pointer hover:border-indigo-300 transition-all group/sub">
                                                    <div className={`w-6 h-6 rounded-lg border-2 transition-all flex items-center justify-center ${sub.completed ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-200 bg-white group-hover/sub:border-indigo-300'}`}>
                                                        {sub.completed && <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"></path></svg>}
                                                    </div>
                                                    <span className={`text-sm font-bold ${sub.completed ? 'line-through text-slate-300 italic font-normal' : 'text-slate-700'}`}>{sub.text}</span>
                                                </div>
                                            ))}
                                            <button onClick={async () => {
                                                const text = prompt('Nombre de la sub-tarea:');
                                                if(text) {
                                                    const { doc, updateDoc } = window.fs;
                                                    const taskRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', task.id);
                                                    await updateDoc(taskRef, { subtasks: [...(task.subtasks || []), {text, completed: false}] });
                                                }
                                            }} className="border-2 border-dashed border-slate-200 p-4 rounded-2xl text-slate-400 text-xs font-black uppercase hover:bg-slate-100 transition-all flex items-center justify-center gap-2 tracking-widest">
                                                <span>+</span> Añadir Tarea de Control
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 max-w-xl w-full shadow-2xl animate-in zoom-in duration-200">
                                <h2 className="text-3xl font-black text-slate-900 uppercase italic mb-8 tracking-tighter text-center">Nueva Operación</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Título</label>
                                        <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-sm outline-none focus:border-indigo-500 transition-all" placeholder="Ej: Trayectorias Cobot" onChange={e => setForm({...form, main: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Descripción Técnica</label>
                                        <textarea className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-medium text-sm h-24 outline-none focus:border-indigo-500 transition-all resize-none" placeholder="..." onChange={e => setForm({...form, desc: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Equipo</label>
                                            <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-xs outline-none" placeholder="Nombres" onChange={e => setForm({...form, members: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Hito Entrega</label>
                                            <input type="date" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-xs outline-none" onChange={e => setForm({...form, deadline: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 mt-6">
                                        <button onClick={() => setIsAdding(false)} className="flex-1 py-4 font-black text-slate-400 text-xs uppercase hover:text-slate-600 transition-colors">Abortar</button>
                                        <button onClick={handleSave} className="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Lanzar a la Nube</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
