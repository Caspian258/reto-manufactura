<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Gestión de Manufactura Avanzada</title>
    <!-- Librerías de React, Tailwind y Animaciones -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>

    <!-- Módulo de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-TtzoEhd9ZE5cqLmPwK2bjD3eHVfEfTo",
            authDomain: "reto-manufactura.firebaseapp.com",
            projectId: "reto-manufactura",
            storageBucket: "reto-manufactura.firebasestorage.app",
            messagingSenderId: "499020157446",
            appId: "1:499020157446:web:87c6a3c4516a73ef9ee987",
            measurementId: "G-C26RT2K5K6"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            
            window.db = db;
            window.auth = auth;
            window.appId = "reto-manufactura";
            window.fs = { collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, writeBatch };
            window.at = { signInAnonymously, onAuthStateChanged };
            window.firebaseReady = true;
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Error Firebase:", error);
            window.firebaseError = error.message;
        }
    </script>

    <!-- Lógica de la Aplicación -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = ['Planta 1', 'Planta 2', 'Docker/Core', 'Cognex', 'Admin', 'Digital Twin'];
        const STATUSES = ['Todo', 'In Progress', 'Completed'];
        const PRIORITIES = ['Low', 'Medium', 'High', 'Critical'];

        const App = () => {
            const [activities, setActivities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('list');
            const [filter, setFilter] = useState('All');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [expandedId, setExpandedId] = useState(null);

            // Formulario de Tarea
            const [form, setForm] = useState({
                category: 'Planta 1',
                main: '',
                desc: '',
                members: '',
                deadline: '',
                status: 'Todo',
                priority: 'Medium'
            });

            useEffect(() => {
                const init = () => {
                    if (window.firebaseReady) setupSync();
                    else window.addEventListener('firebase-ready', setupSync);
                };
                init();
                return () => window.removeEventListener('firebase-ready', setupSync);
            }, []);

            const setupSync = async () => {
                const { signInAnonymously, onAuthStateChanged } = window.at;
                const { collection, onSnapshot } = window.fs;
                await signInAnonymously(window.auth);
                onAuthStateChanged(window.auth, (user) => {
                    if (user) {
                        const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activities');
                        onSnapshot(colRef, (snapshot) => {
                            setActivities(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                            setLoading(false);
                        });
                    }
                });
            };

            const handleSave = async () => {
                const { collection, addDoc, doc, updateDoc } = window.fs;
                try {
                    if (editingTask) {
                        const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', editingTask.id);
                        await updateDoc(docRef, form);
                    } else {
                        const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activities');
                        await addDoc(colRef, { ...form, subtasks: [], createdAt: new Date().toISOString() });
                    }
                    setIsModalOpen(false);
                    setEditingTask(null);
                    setForm({ category: 'Planta 1', main: '', desc: '', members: '', deadline: '', status: 'Todo', priority: 'Medium' });
                } catch (e) { alert("Error: " + e.message); }
            };

            const openEdit = (task) => {
                setEditingTask(task);
                setForm({ ...task });
                setIsModalOpen(true);
            };

            const deleteTask = async (id) => {
                if (confirm('¿Eliminar definitivamente?')) {
                    await window.fs.deleteDoc(window.fs.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', id));
                }
            };

            const toggleSubtask = async (task, index) => {
                const newSubs = [...(task.subtasks || [])];
                newSubs[index].completed = !newSubs[index].completed;
                await window.fs.updateDoc(window.fs.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', task.id), { subtasks: newSubs });
            };

            // Cálculos de Progreso
            const calculateProgress = (subtasks) => {
                if (!subtasks || subtasks.length === 0) return 0;
                const done = subtasks.filter(s => s.completed).length;
                return Math.round((done / subtasks.length) * 100);
            };

            const globalProgress = useMemo(() => {
                if (activities.length === 0) return 0;
                const totalSubs = activities.reduce((acc, curr) => acc + (curr.subtasks?.length || 0), 0);
                const doneSubs = activities.reduce((acc, curr) => acc + (curr.subtasks?.filter(s => s.completed).length || 0), 0);
                return totalSubs === 0 ? 0 : Math.round((doneSubs / totalSubs) * 100);
            }, [activities]);

            // Iconos SVG
            const IconEdit = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>;
            const IconTrash = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                        <p className="font-bold text-slate-400 uppercase tracking-widest text-[10px]">Sincronizando Terminal...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {/* Top Bar - Resumen Global */}
                    <div className="bg-white border-b sticky top-0 z-40 px-6 py-4 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-2xl text-white">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-extrabold text-slate-900 tracking-tight uppercase italic">Smart Factory Manager</h1>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Planta 1 & 2 • Proyecto Reto</p>
                                </div>
                            </div>
                            
                            <div className="w-full md:w-64">
                                <div className="flex justify-between items-end mb-1">
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Progreso del Reto</span>
                                    <span className="text-sm font-black text-indigo-600">{globalProgress}%</span>
                                </div>
                                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-600 transition-all duration-1000" style={{ width: `${globalProgress}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto p-6 md:p-8">
                        {/* Controles de Navegación */}
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                            <div className="flex p-1 bg-slate-100 rounded-2xl">
                                <button onClick={() => setView('list')} className={`px-6 py-2 rounded-xl text-[10px] font-extrabold uppercase transition-all ${view === 'list' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Lista de Tareas</button>
                                <button onClick={() => setView('calendar')} className={`px-6 py-2 rounded-xl text-[10px] font-extrabold uppercase transition-all ${view === 'calendar' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Calendario</button>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <select className="bg-white border p-3 rounded-2xl text-[10px] font-black uppercase outline-none shadow-sm cursor-pointer" onChange={e => setFilter(e.target.value)}>
                                    <option value="All">Todas las Áreas</option>
                                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <button onClick={() => { setEditingTask(null); setIsModalOpen(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-indigo-100 transition-all">Nueva Actividad</button>
                            </div>
                        </div>

                        {/* Vista de Lista */}
                        {view === 'list' ? (
                            <div className="space-y-4">
                                {activities.filter(a => filter === 'All' || a.category === filter).map(task => {
                                    const prog = calculateProgress(task.subtasks);
                                    return (
                                        <div key={task.id} className="bg-white border rounded-[2rem] overflow-hidden shadow-sm hover:shadow-md transition-all">
                                            <div className="p-6 md:p-8 flex flex-col md:flex-row items-center gap-8">
                                                <div className="flex-1 w-full cursor-pointer" onClick={() => setExpandedId(expandedId === task.id ? null : task.id)}>
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">{task.category}</span>
                                                        <span className={`text-[10px] font-black uppercase ${task.priority === 'Critical' ? 'text-red-500 animate-pulse' : 'text-slate-300'}`}>{task.priority} Priority</span>
                                                    </div>
                                                    <h3 className="text-xl font-extrabold text-slate-800 uppercase tracking-tight">{task.main}</h3>
                                                    <p className="text-sm text-slate-400 italic mt-1 line-clamp-1">"{task.desc}"</p>
                                                </div>

                                                <div className="flex flex-col md:flex-row items-center gap-8 md:gap-12 w-full md:w-auto">
                                                    <div className="text-right w-full md:w-24">
                                                        <p className="text-[10px] font-black text-slate-300 uppercase mb-1">Hitos</p>
                                                        <div className="flex items-center justify-end gap-2">
                                                            <div className="flex-1 h-1 bg-slate-100 rounded-full w-12">
                                                                <div className="h-full bg-indigo-500" style={{ width: `${prog}%` }}></div>
                                                            </div>
                                                            <span className="text-xs font-black text-slate-700">{prog}%</span>
                                                        </div>
                                                    </div>
                                                    <div className="text-right w-full md:w-28">
                                                        <p className="text-[10px] font-black text-slate-300 uppercase mb-1">Entrega</p>
                                                        <p className="text-sm font-black text-slate-600">{task.deadline || 'Pendiente'}</p>
                                                    </div>
                                                    <div className="w-full md:w-32">
                                                        <span className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border block text-center shadow-sm ${task.status === 'Completed' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : task.status === 'In Progress' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>
                                                            {task.status}
                                                        </span>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => openEdit(task)} className="p-3 bg-slate-50 text-slate-400 rounded-2xl hover:text-indigo-600 hover:bg-indigo-50 transition-all"><IconEdit /></button>
                                                        <button onClick={() => deleteTask(task.id)} className="p-3 bg-slate-50 text-slate-400 rounded-2xl hover:text-red-600 hover:bg-red-50 transition-all"><IconTrash /></button>
                                                    </div>
                                                </div>
                                            </div>

                                            {expandedId === task.id && (
                                                <div className="bg-slate-50 border-t p-8 animate-in slide-in-from-top-4 duration-300">
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                                        <div>
                                                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Desglose de Tareas (WBS)</h4>
                                                            <div className="space-y-2">
                                                                {(task.subtasks || []).map((sub, i) => (
                                                                    <div key={i} onClick={() => toggleSubtask(task, i)} className="flex items-center gap-4 p-4 bg-white rounded-2xl border cursor-pointer hover:border-indigo-300 transition-all group">
                                                                        <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center ${sub.completed ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-200 group-hover:border-indigo-200'}`}>
                                                                            {sub.completed && <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>}
                                                                        </div>
                                                                        <span className={`text-sm font-bold ${sub.completed ? 'line-through text-slate-300 italic' : 'text-slate-700'}`}>{sub.text}</span>
                                                                    </div>
                                                                ))}
                                                                <button onClick={async () => {
                                                                    const text = prompt('Nueva tarea:');
                                                                    if(text) await window.fs.updateDoc(window.fs.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'activities', task.id), { subtasks: [...(task.subtasks || []), {text, completed: false}] });
                                                                }} className="w-full border-2 border-dashed p-4 rounded-2xl text-[10px] font-black uppercase text-slate-400 hover:bg-slate-100">+ Añadir Hito de Control</button>
                                                            </div>
                                                        </div>
                                                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm h-fit">
                                                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Asignación RACI</h4>
                                                            <div className="space-y-4">
                                                                <div>
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase">Responsables del equipo</span>
                                                                    <p className="text-sm font-black text-slate-800 mt-1">{task.members || 'Sin asignar'}</p>
                                                                </div>
                                                                <div className="pt-4 border-t">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase">Contexto Técnico</span>
                                                                    <p className="text-xs text-slate-500 mt-2 leading-relaxed italic">{task.desc}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            /* Vista Calendario */
                            <div className="bg-white border rounded-[3rem] p-10 shadow-sm animate-in fade-in">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black uppercase tracking-tighter italic">Cronograma de Entrega</h2>
                                    <div className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Marzo 2025</div>
                                </div>
                                <div className="calendar-grid text-center mb-6">
                                    {['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'].map(d => <div key={d} className="text-[10px] font-black text-slate-300 uppercase">{d}</div>)}
                                </div>
                                <div className="calendar-grid">
                                    {Array.from({ length: 35 }).map((_, i) => {
                                        const day = i - 5; // Ajuste manual simple para marzo 2025
                                        const tasks = activities.filter(a => a.deadline && parseInt(a.deadline.split('-')[2]) === day);
                                        return (
                                            <div key={i} className={`min-h-[140px] p-4 border rounded-2xl ${day > 0 && day <= 31 ? 'bg-white border-slate-100' : 'bg-slate-50 border-transparent opacity-20'}`}>
                                                {day > 0 && day <= 31 && (
                                                    <>
                                                        <span className="text-xs font-black text-slate-400 mb-3 block">{day}</span>
                                                        <div className="space-y-1">
                                                            {tasks.map(t => (
                                                                <div key={t.id} className={`text-[8px] font-black uppercase p-1.5 rounded-lg truncate border ${t.priority === 'Critical' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-indigo-50 text-indigo-600 border-indigo-100'}`}>
                                                                    {t.main}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal de Tarea */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-[3rem] w-full max-w-2xl shadow-2xl animate-in zoom-in duration-200 my-8">
                                <div className="p-10 border-b flex justify-between items-center bg-slate-50/50">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">{editingTask ? 'Modificar Registro' : 'Nueva Actividad'}</h2>
                                        <p className="text-[10px] font-bold text-indigo-500 uppercase mt-2 tracking-widest">Configuración de Tarea Maestra</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-3 bg-white border rounded-2xl hover:shadow-lg transition-all text-slate-400"><IconTrash /></button>
                                </div>
                                <div className="p-10 space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Área de Proyecto</label>
                                            <select className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
                                                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Título de Tarea</label>
                                            <input className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" value={form.main} onChange={e => setForm({...form, main: e.target.value})} placeholder="Ej: Trayectorias Cobot" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Descripción Técnica (Manual)</label>
                                        <textarea className="w-full p-4 bg-slate-50 border rounded-2xl font-medium text-sm h-32 resize-none" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} placeholder="Detalles operativos..." />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Equipo Responsable</label>
                                            <input className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" value={form.members} onChange={e => setForm({...form, members: e.target.value})} placeholder="Nombres..." />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Hito Final (Deadline)</label>
                                            <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" value={form.deadline} onChange={e => setForm({...form, deadline: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Estado del Flujo</label>
                                            <select className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                                {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Prioridad Estratégica</label>
                                            <select className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm" value={form.priority} onChange={e => setForm({...form, priority: e.target.value})}>
                                                {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="pt-8 flex gap-4">
                                        <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-black uppercase text-xs text-slate-400 hover:text-slate-700">Abortar</button>
                                        <button onClick={handleSave} className="flex-[2] py-4 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Sincronizar Datos</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
